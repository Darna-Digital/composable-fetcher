name: Update dependencies

on:
  schedule:
    - cron: '0 9 1 * *' # 1st of every month at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm dlx npm-check-updates -u --packageFile packages/core/package.json
      - run: pnpm dlx npm-check-updates -u --packageFile packages/examples/next-e2e/package.json
      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update dependencies'
          branch: chore/update-deps
          title: 'chore: update dependencies'
          body: |
            Automated dependency update.

            Lint, tests, and build passed before opening this PR.
          delete-branch: true
