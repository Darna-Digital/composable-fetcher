name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: examples/next-e2e/pnpm-lock.yaml

      - name: Build library
        run: npm ci && npm run build

      - name: Install example dependencies
        run: pnpm install
        working-directory: examples/next-e2e

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: examples/next-e2e

      - name: Run Playwright e2e
        run: pnpm e2e
        working-directory: examples/next-e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/next-e2e/playwright-report
          if-no-files-found: ignore
